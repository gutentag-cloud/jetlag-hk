<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0d1117" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E" />
<title>Jet Lag HK — District Claiming</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="css/styles.css?v=8" />
</head>
<body>
<div id="app">
  <!-- ============ TOP BAR ============ -->
  <header class="topbar">
    <div class="brand">
      <span class="logo">✈️</span>
      <div>
        <div class="brand-title">Jet Lag <b>HK</b></div>
        <div class="brand-sub">District Claiming</div>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab" data-tab="game">🌍 Game</button>
      <button class="tab" data-tab="team">👤 My Team</button>
      <button class="tab" data-tab="build">🛠 Build</button>
    </nav>
    <button id="idChip" class="conn-chip id-chip" title="Log in / identity"><span class="conn-dot"></span><span>Spectator</span></button>
    <button id="connBtn" class="conn-chip" title="Multi-device sync"><span class="conn-dot" id="connDot"></span><span id="connLabel">Offline</span></button>
  </header>

  <!-- ============ GAME (shared) ============ -->
  <main id="tab-game" class="tab-panel">
    <div class="play-layout">
      <section class="map-wrap">
        <div id="map"></div>
        <div class="map-tools">
          <div class="map-tool-row" id="actingRow"></div>
          <div class="map-mode" id="mapModeRow">
            <button class="mode-btn active" data-mode="claim">Claim</button>
            <button class="mode-btn" data-mode="info">Borders</button>
            <button class="mode-btn" data-mode="roadblock">Roadblock</button>
          </div>
          <div class="map-hint" id="mapHint">Tap a district to claim it for your team.</div>
        </div>
      </section>
      <aside class="play-side">
        <div class="side-scroll">
          <div class="card" id="leaderboardCard">
            <div class="card-h">🏆 Leaderboard <span class="card-h-note">most districts · area tiebreak</span></div>
            <div id="leaderboard"></div>
          </div>
          <div class="card">
            <div class="card-h">⏱ Active Roadblocks <span class="card-h-note" id="effCount"></span></div>
            <div id="effectsPanel"><div class="empty">No active roadblocks.</div></div>
          </div>
          <div class="card">
            <div class="card-h">🃏 The Flop <span class="card-h-note" id="deckCount"></span></div>
            <div id="deckTools"></div>
            <div id="publicDeck"></div>
          </div>
          <div class="card">
            <div class="card-h">📜 Activity Log</div>
            <div id="logPanel" class="log"></div>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <!-- ============ MY TEAM (private) ============ -->
  <main id="tab-team" class="tab-panel hidden">
    <div class="team-layout"><div class="side-scroll" id="teamBody"></div></div>
  </main>

  <!-- ============ BUILD (host editor) ============ -->
  <main id="tab-build" class="tab-panel hidden">
    <div class="build-layout">
      <nav class="build-nav">
        <button class="bnav active" data-bview="challenges">🃏 Challenge Deck</button>
        <button class="bnav" data-bview="districts">🗺 Districts</button>
        <button class="bnav" data-bview="borders">🔗 Borders</button>
        <button class="bnav" data-bview="rules">📖 Rules Reference</button>
        <button class="bnav" data-bview="data">💾 Data / Export</button>
      </nav>
      <section class="build-body" id="buildBody"></section>
    </div>
  </main>

  <!-- modals -->
  <div class="modal-back hidden" id="connModal"><div class="modal">
    <div class="modal-h">Log in / Identity<button class="x" data-close>×</button></div>
    <div class="modal-body" id="connModalBody"></div></div></div>
  <div class="modal-back hidden" id="genModal"><div class="modal">
    <div class="modal-h"><span id="genTitle">…</span><button class="x" data-close>×</button></div>
    <div class="modal-body" id="genBody"></div></div></div>

  <div id="toast" class="toast hidden"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="js/data.js?v=8"></script>
<script src="js/firebase-config.js?v=8"></script>
<script src="js/sync.js?v=8"></script>
<script src="js/auth.js?v=8"></script>
<script src="js/scoring.js?v=8"></script>
<script src="js/mtr.js?v=8"></script>
<script src="js/map.js?v=8"></script>
<script src="js/game.js?v=8"></script>
<script src="js/team.js?v=8"></script>
<script src="js/build.js?v=8"></script>
<script src="js/app.js?v=8"></script>
</body>
</html>
